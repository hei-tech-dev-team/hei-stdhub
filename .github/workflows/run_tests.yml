name: Test on pull request

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hei_stdhub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Create test .env
        run: |
          cat > backend/.env << EOF
          PORT=3001
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/hei_stdhub_test
          JWT_SECRET=test-secret-for-ci
          CLIENT_URL=http://localhost:5173
          VAPID_PUBLIC_KEY=BG1Snxph0P6qGSPIuQNKcT-Vsl5WSuH5aylj8uEKN4tdgAGxflz06YsCxT3biGbmE_p3GHpNYHFmiDi1kKXOqJo
          VAPID_PRIVATE_KEY=uDhn5NP1E7lat3AN1p92r4gy2_iKgpPZTGJbBqk-AHc
          NODE_ENV=test
          EOF

      - name: Seed database
        run: psql "$DATABASE_URL" -f backend/db/schema.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hei_stdhub_test

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
